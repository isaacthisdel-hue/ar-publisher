<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #222230;
      --accent: #e8ff47; --accent2: #47ffcc; --text: #f0f0f5;
      --muted: #5a5a72; --error: #ff4757; --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--display); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(232,255,71,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,71,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .wrapper { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }
    header { display: flex; align-items: flex-end; gap: 1.5rem; margin-bottom: 3rem; }
    .logo { width: 50px; height: 50px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; clip-path: polygon(0 0,100% 0,100% 70%,70% 100%,0 100%); }
    h1 { font-size: clamp(2rem,5vw,2.8rem); font-weight: 800; letter-spacing: -.03em; line-height: 1; }
    h1 span { color: var(--accent); }
    .tagline { font-family: var(--mono); font-size: .72rem; color: var(--muted); margin-top: .4rem; }
    #ffstatus { font-family: var(--mono); font-size: .68rem; padding: .3rem .8rem; border: 1px solid var(--border); color: var(--muted); display: inline-flex; align-items: center; gap: .5rem; margin-bottom: 2rem; }
    #ffstatus.ok { border-color: var(--accent2); color: var(--accent2); }
    #ffstatus.error { border-color: var(--error); color: var(--error); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 1.8rem; margin-bottom: 1.2rem; }
    .card-label { font-family: var(--mono); font-size: .62rem; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; margin-bottom: 1.2rem; display: flex; align-items: center; gap: .6rem; }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    #drop-zone { border: 2px dashed var(--border); padding: 2.5rem 2rem; text-align: center; cursor: pointer; position: relative; transition: border-color .2s, background .2s; }
    #drop-zone.over { border-color: var(--accent); background: rgba(232,255,71,.04); }
    #drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .drop-icon { font-size: 2.2rem; display: block; margin-bottom: .6rem; }
    .drop-p { font-size: 1rem; font-weight: 600; margin-bottom: .3rem; }
    .drop-sub { font-family: var(--mono); font-size: .68rem; color: var(--muted); }
    #file-list { margin-top: 1rem; display: flex; flex-direction: column; gap: .4rem; }
    .chip { display: flex; align-items: center; gap: .7rem; background: rgba(255,255,255,.03); border: 1px solid var(--border); padding: .45rem .7rem; font-family: var(--mono); font-size: .72rem; }
    .chip .fn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip .fs { color: var(--muted); flex-shrink: 0; }
    .chip .rm { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; flex-shrink: 0; transition: color .15s; }
    .chip .rm:hover { color: var(--error); }
    .row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
    .field { flex: 1; min-width: 130px; }
    label { display: block; font-family: var(--mono); font-size: .62rem; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: .4rem; }
    input[type=number] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 1.2rem; padding: .7rem 1rem; outline: none; transition: border-color .2s; appearance: textfield; }
    input[type=number]:focus { border-color: var(--accent); }
    .btn { background: var(--accent); color: #000; font-family: var(--display); font-weight: 800; font-size: .85rem; letter-spacing: .05em; border: none; padding: .8rem 1.8rem; cursor: pointer; text-transform: uppercase; transition: background .15s, transform .1s; white-space: nowrap; flex-shrink: 0; }
    .btn:hover:not(:disabled) { background: #d4eb30; }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    #prog-sec { display: none; }
    .bar-wrap { height: 3px; background: var(--border); margin-bottom: 1rem; }
    .bar-fill { height: 100%; background: var(--accent); transition: width .4s; }
    .status-txt { font-family: var(--mono); font-size: .72rem; color: var(--muted); }
    #res-sec { display: none; }
    .rcard { background: var(--bg); border: 1px solid var(--border); padding: 1.1rem 1.4rem; margin-bottom: .6rem; display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
    .rcard.err { border-color: var(--error); }
    .rinfo { flex: 1; min-width: 0; }
    .rname { font-weight: 600; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: .3rem; }
    .rmeta { font-family: var(--mono); font-size: .65rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; }
    .ract { display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }
    .rin { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: .72rem; padding: .38rem .6rem; width: 160px; outline: none; }
    .rin:focus { border-color: var(--accent2); }
    .bsm { font-family: var(--mono); font-size: .68rem; padding: .4rem .85rem; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: border-color .15s, color .15s, background .15s; text-decoration: none; display: inline-block; white-space: nowrap; }
    .bsm:hover { border-color: var(--accent2); color: var(--accent2); }
    .bsm.dl { border-color: var(--accent); color: var(--accent); }
    .bsm.dl:hover { background: var(--accent); color: #000; }
    .errmsg { font-family: var(--mono); font-size: .72rem; color: var(--error); }
    #reset { display: none; background: none; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: .68rem; padding: .5rem 1.2rem; cursor: pointer; margin-top: 1.2rem; transition: border-color .15s, color .15s; }
    #reset:hover { border-color: var(--text); color: var(--text); }
    #toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid var(--border); font-family: var(--mono); font-size: .72rem; padding: .7rem 1.1rem; opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; transform: none; }
    #toast.ok  { border-color: var(--accent2); color: var(--accent2); }
    #toast.err { border-color: var(--error);   color: var(--error); }
    @media(max-width:580px) { .row { flex-direction: column; align-items: stretch; } .rcard { flex-direction: column; align-items: flex-start; } .ract { width: 100%; } }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="4" width="14" height="16" rx="1" fill="#000"/>
        <rect x="5" y="7" width="8" height="1.5" fill="#e8ff47"/>
        <rect x="5" y="10.5" width="8" height="1.5" fill="#e8ff47"/>
        <rect x="5" y="14" width="5" height="1.5" fill="#e8ff47"/>
        <path d="M17 9l5 3-5 3V9z" fill="#000"/>
      </svg>
    </div>
    <div>
      <h1>Frame<span>Forge</span></h1>
      <p class="tagline">// video → frames for photogrammetry</p>
    </div>
  </header>

  <div id="ffstatus"><span class="dot"></span><span id="fftxt">Checking FFmpeg…</span></div>

  <div class="card">
    <div class="card-label">01 — Upload Videos</div>
    <div id="drop-zone">
      <input type="file" id="fi" multiple accept=".mov,.mp4,.avi,.mkv,.wmv,.flv,.webm,.m4v,.mts,.m2ts" />
      <span class="drop-icon">🎬</span>
      <p class="drop-p">Drop videos here or click to browse</p>
      <p class="drop-sub">.mov .mp4 .avi .mkv .webm and more</p>
    </div>
    <div id="file-list"></div>
  </div>

  <div class="card">
    <div class="card-label">02 — Configure</div>
    <div class="row">
      <div class="field">
        <label for="fc">Frames per video</label>
        <input type="number" id="fc" value="60" min="1" max="10000" />
      </div>
      <button class="btn" id="go" disabled>Extract Frames →</button>
    </div>
  </div>

  <div class="card" id="prog-sec">
    <div class="card-label">03 — Processing</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    <div class="status-txt" id="stxt">Starting…</div>
  </div>

  <div class="card" id="res-sec">
    <div class="card-label">04 — Download</div>
    <div id="rlist"></div>
  </div>

  <button id="reset">↺ &nbsp;Process more videos</button>
</div>

<div id="toast"></div>

<script>
  let files = [], poll;
  const $  = id => document.getElementById(id);
  const dz = $('drop-zone'), fi = $('fi'), fl = $('file-list');
  const fc = $('fc'), go = $('go');
  const ps = $('prog-sec'), bar = $('bar'), stxt = $('stxt');
  const rs = $('res-sec'), rl = $('rlist');

  fetch('/api/status').then(r=>r.json()).then(d=>{
    const el = $('ffstatus');
    el.classList.add(d.ok ? 'ok' : 'error');
    $('fftxt').textContent = d.ok ? `FFmpeg ${d.version} ready` : 'FFmpeg not found on server';
    if (!d.ok) go.disabled = true;
  });

  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('over'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('over'); add([...e.dataTransfer.files]); });
  fi.addEventListener('change', ()=>{ add([...fi.files]); fi.value=''; });

  function add(newFiles) {
    const re = /\.(mov|mp4|avi|mkv|wmv|flv|webm|m4v|mts|m2ts)$/i;
    newFiles.forEach(f => {
      if (!re.test(f.name)) { toast(`Skipped: ${f.name}`, 'err'); return; }
      if (!files.find(x=>x.name===f.name&&x.size===f.size)) files.push(f);
    });
    render();
  }

  function render() {
    fl.innerHTML = '';
    files.forEach((f,i) => {
      const c = document.createElement('div');
      c.className = 'chip';
      c.innerHTML = `<span class="fn" title="${e(f.name)}">${e(f.name)}</span><span class="fs">${fmt(f.size)}</span><button class="rm" data-i="${i}">×</button>`;
      fl.appendChild(c);
    });
    fl.querySelectorAll('.rm').forEach(b => b.addEventListener('click', ()=>{ files.splice(+b.dataset.i,1); render(); }));
    go.disabled = files.length === 0;
  }

  go.addEventListener('click', async () => {
    const frames = parseInt(fc.value);
    if (!frames||frames<1) { toast('Enter a valid frame count','err'); return; }
    if (!files.length) { toast('Add at least one video','err'); return; }
    go.disabled = true;
    ps.style.display = 'block';
    rs.style.display = 'none';
    rl.innerHTML = '';
    bar.style.width = '0%';
    stxt.textContent = 'Uploading…';
    const fd = new FormData();
    fd.append('frames', frames);
    files.forEach(f => fd.append('videos', f));
    try {
      const res = await fetch('/api/process', { method:'POST', body:fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      stxt.textContent = 'Processing…';
      poll = setInterval(()=>pollJob(data.jobId), 1400);
    } catch(err) { toast(err.message,'err'); go.disabled=false; }
  });

  async function pollJob(id) {
    try {
      const j = await fetch(`/api/job/${id}`).then(r=>r.json());
      const pct = j.total>0 ? Math.round(j.done/j.total*100) : 0;
      bar.style.width = pct+'%';
      stxt.textContent = `${j.done} / ${j.total} videos done…`;
      if (j.status==='done') { clearInterval(poll); showResults(j); }
    } catch(_){}
  }

  function showResults(j) {
    bar.style.width = '100%';
    stxt.textContent = `Complete — ${j.results.length} succeeded, ${j.errors.length} failed.`;
    rs.style.display = 'block';
    rl.innerHTML = '';
    j.results.forEach(r => {
      const c = document.createElement('div');
      c.className = 'rcard';
      c.innerHTML = `
        <div class="rinfo">
          <div class="rname">${e(r.originalName)}</div>
          <div class="rmeta"><span>⏱ ${r.duration}s</span><span>🎞 ${r.fps} fps</span><span>🖼 ${r.extracted} frames</span></div>
        </div>
        <div class="ract">
          <input class="rin" type="text" value="${e(r.safeBase)}" />
          <button class="bsm rnbtn" data-path="${e(r.zipPath)}">Rename</button>
          <a class="bsm dl" href="${e(r.zipPath)}" download>↓ ZIP</a>
        </div>`;
      const btn = c.querySelector('.rnbtn'), inp = c.querySelector('.rin'), dl = c.querySelector('.dl');
      let cur = r.zipPath;
      btn.addEventListener('click', async () => {
        const n = inp.value.trim(); if(!n) return;
        btn.textContent='…'; btn.disabled=true;
        try {
          const d = await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oldPath:cur,newName:n})}).then(r=>r.json());
          cur=d.newPath; dl.href=d.newPath; dl.download=d.newName;
          toast(`Renamed to ${d.newName}`,'ok');
        } catch(err){ toast(err.message,'err'); }
        btn.textContent='Rename'; btn.disabled=false;
      });
      rl.appendChild(c);
    });
    j.errors.forEach(r => {
      const c = document.createElement('div');
      c.className = 'rcard err';
      c.innerHTML = `<div class="rinfo"><div class="rname">${e(r.originalName)}</div><div class="errmsg">⚠ ${e(r.error)}</div></div>`;
      rl.appendChild(c);
    });
    $('reset').style.display = 'inline-block';
  }

  $('reset').addEventListener('click', ()=>{
    files=[]; render();
    ps.style.display='none'; rs.style.display='none';
    rl.innerHTML=''; $('reset').style.display='none';
    bar.style.width='0%';
  });

  function fmt(b) {
    if(b<1024) return b+'B';
    if(b<1048576) return (b/1024).toFixed(1)+'KB';
    if(b<1073741824) return (b/1048576).toFixed(1)+'MB';
    return (b/1073741824).toFixed(2)+'GB';
  }
  function e(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  let tt;
  function toast(msg,type='ok'){ const t=$('toast'); t.textContent=msg; t.className=`show ${type}`; clearTimeout(tt); tt=setTimeout(()=>t.className='',3000); }
</script>
</body>
</html>
